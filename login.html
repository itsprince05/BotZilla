<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            color: #1c1e21;
            -webkit-user-select: none;
            user-select: none;
        }

        .action-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            box-sizing: border-box;
            height: 48px;
            background: #2481cc;
            color: white;
            padding: 0 10px;
            gap: 10px;
            display: flex;
            align-items: center;
        }

        .navbar-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: #2481cc;
        }

        .navbar-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .container {
            max-width: 400px;
            margin: 40px auto;
            padding: 10px;
        }

        .card {
            background: #ffffff;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card h3 {
            margin-top: 0;
            font-size: 18px;
            color: #1c1e21;
            margin-bottom: 5px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #2481cc;
        }

        .primary-btn {
            width: 100%;
            padding: 12px;
            background: #2481cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .primary-btn:hover {
            background: #1e6eb0;
        }

        .error {
            color: #fa5252;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="action-bar">
        <div class="navbar-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>
        <div class="navbar-title">Dashboard Login</div>
    </div>

    <div class="container">
        <div class="card">
            <h3>Authentication Required</h3>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <form method="POST" style="display: flex; flex-direction: column; gap: 15px; margin: 0;">
                <input type="password" name="password" placeholder="Enter Password" required>
                <button type="submit" class="primary-btn">LOGIN</button>
            </form>
        </div>
    </div>
</body>
</html>
